<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ASC Automação</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:linear-gradient(135deg,#e0eaf4,#cfdef3);
  font-family:'Segoe UI',Roboto,sans-serif;
  padding:30px
}
body.modal-open{overflow:hidden}
.container{max-width:1300px;margin:auto}

/* Cards */
.card{background:#fff;border-radius:28px;box-shadow:0 20px 40px rgba(0,0,0,.1);margin-bottom:30px}
.card-header{background:#1a3c5c;padding:20px 28px;color:#fff}
.card-body{padding:28px}

label{font-weight:600;margin-top:14px;display:block}
input,select{
  width:100%;padding:10px 14px;
  border-radius:40px;border:1px solid #cbd5e1
}

button{
  background:#1a3c5c;color:#fff;border:none;
  border-radius:40px;padding:12px 22px;
  font-weight:600;cursor:pointer;margin-top:12px;margin-right:6px
}
button:hover{background:#0f2c44}

.btn-light{background:#e2e8f0;color:#0f172a}
.btn-danger{background:#fee2e2;color:#b91c1c}
.btn-danger:hover{background:#fecaca}

.item{
  background:#f8fafc;padding:14px;border-radius:16px;
  margin-top:10px;display:flex;
  justify-content:space-between;align-items:center
}

.hide{display:none}

.fab{
  position:fixed;bottom:30px;right:30px;
  width:64px;height:64px;border-radius:50%;
  background:#1a3c5c;color:#fff;font-size:34px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;box-shadow:0 10px 25px rgba(0,0,0,.3)
}

.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.55);
  display:flex;align-items:center;justify-content:center
}
.overlay.hide{display:none}
.overlay .card{max-width:750px;width:100%}
</style>
</head>

<body>
<div class="container">

<!-- CONFIGURAÇÃO DE CONTA -->
<div class="card">
  <div class="card-header"><h2>⚙ Configuração de Conta</h2></div>
  <div class="card-body">
    <label>Conta padrão do ASC</label>
    <select id="contaSelect">
      <option value="">Selecione</option>
      <option value="12">Affinity (Conta 12)</option>
      <option value="7">Azul Seguros (Conta 7)</option>
      <option value="3">Bancos (Conta 3)</option>
      <option value="14">Concierge (Conta 13)</option>
      <option value="11">Focal (Conta 11)</option>
      <option value="9">Garantia (Conta 9)</option>
      <option value="5">HDI (Conta 5)</option>
      <option value="10">Ilha Carga (Conta 10)</option>
      <option value="1">Novos Produtos (Conta 1)</option>
      <option value="15">NPS Maxpar (Conta 14)</option>
      <option value="16">Onboarding Sinistros (Conta 15)</option>
      <option value="2">Pós Atendimento (Conta 2)</option>
      <option value="6">Porto Seguro (Conta 6)</option>
      <option value="8">Premium/Blindados (Conta 8)</option>
      <option value="4">Tokio (Conta 4)</option>
    </select>
    <button onclick="salvarConta()">Salvar Conta</button>
  </div>
</div>

<!-- HOME -->
<div class="card" id="homeCard">
  <div class="card-header"><h2>📂 Fases</h2></div>
  <div class="card-body" id="listaFases"></div>
</div>

<!-- EXECUÇÃO -->
<div class="card hide" id="execCard">
  <div class="card-header"><h2 id="execTitulo"></h2></div>
  <div class="card-body">

    <!-- CAMPOS FIXOS -->
    <label>Segurado *</label><input id="seg">
    <label>Telefone *</label><input id="tel">
    <label>Conta *</label><input id="conta" disabled>
    <label>Matrícula *</label><input id="mat">

    <hr style="margin:20px 0">

    <!-- CAMPOS DA FASE -->
    <div id="extraCampos"></div>

    <button onclick="addAtendimento()">➕ Adicionar Atendimento</button>
    <button onclick="exportarCSV()">📄 Exportar CSV</button>
    <button class="btn-light" onclick="voltar()">⬅ Voltar</button>

    <hr style="margin:20px 0">
    <div id="listaAtendimentos"></div>
  </div>
</div>

</div>

<!-- + -->
<div class="fab" onclick="abrirCadastro()">+</div>

<!-- CADASTRO DE FASE -->
<div class="overlay hide" id="cadastro" onclick="fecharCadastro()">
  <div class="card" onclick="event.stopPropagation()">
    <div class="card-header"><h2>✳ Cadastro de Fase</h2></div>
    <div class="card-body">
      <label>Nome da Fase</label>
      <input id="nomeFase">

      <label>Adicionar Campo</label>
      <input id="campoNovo">
      <button onclick="addCampo()">Adicionar Campo</button>

      <div id="listaCampos"></div>

      <button onclick="salvarFase()">Salvar Fase</button>
      <button class="btn-light" onclick="fecharCadastro()">Sair</button>
    </div>
  </div>
</div>

<script>
/* ---------- DADOS ---------- */
let fases = JSON.parse(localStorage.getItem("fases")) || [];
let configConta = JSON.parse(localStorage.getItem("config_conta"));
let faseAtiva = null;
let camposTemp = [];
let atendimentos = [];

/* ---------- CONTA ---------- */
function salvarConta(){
  const s = contaSelect;
  if(!s.value){alert("Selecione uma conta");return;}
  configConta={valor:s.value,nome:s.options[s.selectedIndex].text};
  localStorage.setItem("config_conta",JSON.stringify(configConta));
  alert("Conta salva");
}

if(configConta){
  contaSelect.value = configConta.valor;
}

/* ---------- HOME ---------- */
function renderHome(){
  homeCard.classList.remove("hide");
  execCard.classList.add("hide");

  listaFases.innerHTML = fases.length===0
    ? "<p>Nenhuma fase cadastrada.</p>"
    : fases.map((f,i)=>`
      <div class="item">
        <span onclick="abrirFase(${i})" style="cursor:pointer">${f.nome}</span>
        <button class="btn-danger" onclick="excluirFase(${i})">🗑</button>
      </div>
    `).join("");
}

/* ---------- FASE ---------- */
function abrirFase(i){
  if(!configConta){alert("Configure a conta primeiro.");return;}
  faseAtiva=fases[i];
  atendimentos=[];
  homeCard.classList.add("hide");
  execCard.classList.remove("hide");

  execTitulo.innerText=faseAtiva.nome;
  conta.value=configConta.nome;
  extraCampos.innerHTML = faseAtiva.campos.map(c=>`
    <label>${c}</label><input>
  `).join("");

  listaAtendimentos.innerHTML="";
}

function voltar(){ renderHome(); }

function excluirFase(i){
  if(!confirm("Excluir fase?"))return;
  fases.splice(i,1);
  localStorage.setItem("fases",JSON.stringify(fases));
  renderHome();
}

/* ---------- ATENDIMENTO ---------- */
function addAtendimento(){
  const fixos=[seg.value,tel.value,configConta.valor,mat.value];
  if(fixos.some(v=>!v)){alert("Preencha campos obrigatórios");return;}

  const extras=[...extraCampos.querySelectorAll("input")].map(i=>i.value);
  atendimentos.push([...fixos,...extras]);
  renderAtendimentos();
}

function renderAtendimentos(){
  listaAtendimentos.innerHTML = atendimentos.map((a,i)=>`
    <div class="item">
      ${a.join(" | ")}
      <button class="btn-danger" onclick="delAtendimento(${i})">🗑</button>
    </div>
  `).join("");
}

function delAtendimento(i){
  atendimentos.splice(i,1);
  renderAtendimentos();
}

function exportarCSV(){
  if(atendimentos.length===0){alert("Nada para exportar");return;}
  const header=["Segurado","Telefone","Conta","Matricula",...faseAtiva.campos];
  const csv=header.join(",")+"\n"+atendimentos.map(a=>a.join(",")).join("\n");
  const b=new Blob([csv]);const a=document.createElement("a");
  a.href=URL.createObjectURL(b);a.download="asc_input.csv";a.click();
}

/* ---------- CADASTRO ---------- */
function abrirCadastro(){
  cadastro.classList.remove("hide");
  document.body.classList.add("modal-open");
  camposTemp=[];listaCampos.innerHTML="";
}
function fecharCadastro(){
  cadastro.classList.add("hide");
  document.body.classList.remove("modal-open");
}
function addCampo(){
  if(!campoNovo.value)return;
  camposTemp.push(campoNovo.value);campoNovo.value="";
  listaCampos.innerHTML=camposTemp.map(c=>`<div>${c}</div>`).join("");
}
function salvarFase(){
  if(!nomeFase.value||camposTemp.length===0){alert("Preencha tudo");return;}
  fases.push({nome:nomeFase.value,campos:camposTemp});
  localStorage.setItem("fases",JSON.stringify(fases));
  fecharCadastro();renderHome();
}

/* INIT */
renderHome();
</script>
</body>
</html>
